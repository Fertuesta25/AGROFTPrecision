<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- Fondo transparente -->
  <rect width="24" height="24" fill="none"/>
  
  <!-- Marco de la tabla -->
  <rect x="3" y="3" width="18" height="18" rx="1" ry="1" fill="none" stroke="#3388ff" stroke-width="1.5"/>
  
  <!-- Línea horizontal de encabezado -->
  <line x1="3" y1="7" x2="21" y2="7" stroke="#3388ff" stroke-width="1.5"/>
  
  <!-- Línea vertical que divide la primera columna -->
  <line x1="9" y1="3" x2="9" y2="21" stroke="#3388ff" stroke-width="1.5"/>
  
  <!-- Línea vertical que divide la segunda columna -->
  <line x1="15" y1="3" x2="15" y2="21" stroke="#3388ff" stroke-width="1.5"/>
  
  <!-- Líneas horizontales de las filas -->
  <line x1="3" y1="11" x2="21" y2="11" stroke="#3388ff" stroke-width="1"/>
  <line x1="3" y1="15" x2="21" y2="15" stroke="#3388ff" stroke-width="1"/>
  
  <!-- Texto de encabezado (representado gráficamente) -->
  <rect x="4" y="4" width="4" height="2" fill="#3388ff" rx="0.5" ry="0.5"/>
  <rect x="10" y="4" width="4" height="2" fill="#3388ff" rx="0.5" ry="0.5"/>
  <rect x="16" y="4" width="4" height="2" fill="#3388ff" rx="0.5" ry="0.5"/>
  
  <!-- Símbolo de suma en la parte inferior -->
  <path d="M17,18 L19,18 M18,17 L18,19" stroke="#ff3333" stroke-width="1.5" stroke-linecap="round"/>
</svg>